events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Brotli/gzip kompresija za Blazor .wasm i .dll
    gzip on;
    gzip_types text/plain text/css application/javascript application/wasm application/octet-stream;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback - sve rute idu na index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # WebAssembly MIME type
        location ~* \.wasm$ {
            add_header Content-Type application/wasm;
        }

        # Cache za statičke resurse
        location ~* \.(js|css|png|jpg|ico|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Ne cachirati index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
